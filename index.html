<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>SRC Weather - 수원 주요 12개 코스 현황</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Pretendard:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- 헤더 영역 -->
      <header class="app-header">
        <div class="header-main">
          <div class="brand">
            <div class="brand-title-wrap">
              <span class="pulse-dot"></span>
              <h1 id="app-title">SRC Weather</h1>
            </div>
            <p id="app-subtitle">SRC 러너들을 위한 수원 12개 러닝 코스 기상 모니터링</p>
          </div>
          <div class="header-right">
            <div class="lang-switch">
              <button class="lang-btn active" data-lang="ko">한</button>
              <button class="lang-btn" data-lang="en">EN</button>
            </div>
            <div class="src-logo">
              <img src="images/src-logo.png" alt="SRC logo" />
            </div>
          </div>
        </div>
      </header>

      <main class="main-content">
        <!-- 상단 현황 요약 배너 -->
        <section class="status-banner">
          <div id="status" class="status-inner">
            <p>SRC 러너용 기상 정보 불러오는 중…</p>
          </div>
          <div id="course-list-updated" class="course-list-updated"></div>
        </section>

        <!-- 12개 코스 전체 그리드 리스트 -->
        <section class="course-section">
          <div id="courses" class="course-grid">
            <!-- 12개 코스가 한눈에 들어오도록 카드 삽입 -->
          </div>
        </section>
      </main>

      <footer class="app-footer">
        Powered by KMA & AirKorea · Run with <strong>SRC</strong>!
      </footer>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
